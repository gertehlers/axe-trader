spring:
  config:
    import: optional:file:.env[.properties]
  application:
    group: @project.groupId@
    name: @project.name@
    version: @project.version@
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  datasource:
    url: jdbc:sqlite:data/axe-trader.sqlite
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

brokers:
  capital:
    api:
      url: https://demo-api-capital.backend-capital.com
      user:
        login: ${CAPITAL_API_USER}
        password: ${CAPITAL_API_PASSWORD}
        apiKey: ${CAPITAL_API_KEY}

axe-trader:
  mode: backtest
  market:
    epics: US500
    resolutions: MINUTE

backtest:
  epic: US500
  limit: 10000          # number of 1-minute bars to load from DB
  timeframe-minutes: 5  # aggregate target (5 = 5m chart)

  strategy:
    rsi-period: 7
    rsi-smooth-period: 7
    bb-period: 20
    bb-multiplier: 2.0
    ema-period: 50
    atr-period: 14
    rsi-oversold: 30
    rsi-overbought: 70
    stop-atr-multiple: 1.5
    target-atr-multiple: 3.0

    # 5-pillar confluence voting
    confluence-threshold: 2        # votes (pillars) that must agree before entering; tune for quality vs. frequency
    proximity-atr-multiple: 0.5    # "near" a swing level, in ATR units (pillar 3)
    swing-lookback-bars: 10        # backward window for support/resistance & structure (pillars 3 & 4)
    volume-sma-period: 20          # volume baseline (pillar 5)
    enable-candles: true           # pillar 2 — added in step 2
    enable-support-resistance: true # pillar 3 — added in step 3
    enable-structure: true         # pillar 4 — added in step 4
    enable-volume-trend: true      # pillar 5 — added in step 5

logging:
  file:
    name: logs/axe-trader.log
  level:
    io.g3tech: trace
