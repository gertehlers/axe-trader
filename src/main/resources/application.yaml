spring:
  config:
    import: optional:file:.env[.properties]
  application:
    group: @project.groupId@
    name: @project.name@
    version: @project.version@
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  datasource:
    url: jdbc:sqlite:data/axe-trader.sqlite
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

brokers:
  capital:
    api:
      url: https://demo-api-capital.backend-capital.com
      user:
        login: ${CAPITAL_API_USER}
        password: ${CAPITAL_API_PASSWORD}
        apiKey: ${CAPITAL_API_KEY}

axe-trader:
  mode: backtest
  market:
    epics: US500
    resolutions: MINUTE

backtest:
  epic: US500
  limit: 10000          # number of 1-minute bars to load from DB
  timeframe-minutes: 10 # aggregate target (10 = 10m chart); the momentum edge peaks here (iter 17-18)

  contract:
    value-per-point: 1.0  # account P&L per 1.0 index point per unit (Capital.com US500 CFD ~$1/pt); translates backtest points to $

  # US500 profile — MOMENTUM @ 10m, promoted 2026-07-04 (TODO.md tuning log iterations 14-18).
  # Best result in the project, validated in AND out of sample with EVERY quarter positive:
  #   In-sample  (Dec'24-Dec'25): +0.52 pts/trade, 53% win, 3.0 trades/day, all 5 quarters positive.
  #   Out-of-sample (Jan-May'26): +0.45 pts/trade, 53% win, 2.7 trades/day, both quarters positive.
  # Positive skew (small stops, winners trail via the scale-out exit). The duration scan (iter 17)
  # found 10m beats 15m/5m — 5m mean-reverts (dip-buying wins ~80% but is break-even), while at 10m
  # moves clear the spread and breakouts trend. Supersedes the 5m mean-reversion profile (iters 1-13,
  # kept as mode: MEAN_REVERSION for reference). Next: refine the 10m surface via walk-forward (wider
  # tiers and dropping the slope gate both looked better in-sample but are not yet OOS-validated).
  strategy:
    mode: MOMENTUM  # entry thesis: MOMENTUM (breakout continuation, positive-skew) | MEAN_REVERSION (dip-buying, ~80% win but break-even at 5m)
    rsi-period: 7
    rsi-smooth-period: 7
    bb-period: 20
    bb-multiplier: 2.0
    ema-period: 50
    atr-period: 14
    rsi-oversold: 25      # MEAN_REVERSION only (unused in MOMENTUM; momentum pillar 1 is RSI>50 & rising)
    rsi-overbought: 75    # MEAN_REVERSION only
    stop-atr-multiple: 1.5    # initial (pre-T1) stop — tight, for positive skew (scale-out on)
    target-atr-multiple: 0.75 # unused while scale-out-enabled (tiers replace the single target)
    max-holding-bars: 0   # force-exit after N bars if neither stop nor target hit (0 = disabled)
    trend-ema-period: 200 # hard directional gate: long only above / short only below this EMA (0 = disabled)
    trend-ema-max-atr: 0  # proximity ceiling: only enter within N ATR of the trend EMA (0 = disabled; MEAN_REVERSION dead-end, iter 10)
    trend-ema-slope-lookback: 50 # regime gate: longs only when the trend EMA is rising over the last N bars (up-regime momentum)

    # 3-tier scale-out exit (iteration 11, aggressive-trail ratchet). ON for the momentum profile:
    # bank 1/3 at T1 (stop->breakeven), 1/3 at T2 (stop->T1), final 1/3 trails. stop-atr-multiple is
    # the initial stop; target-atr-multiple is ignored. Tiers pushed out + wide trail = winners run.
    scale-out-enabled: true
    tier1-atr-multiple: 1.5    # bank 1/3 here, then stop -> breakeven
    tier2-atr-multiple: 3.0    # bank 1/3 here, then stop -> tier1
    trail-atr-multiple: 2.5    # final 1/3 trails at peak - N*ATR, floored at tier1

    # Confluence voting — MOMENTUM pillars: RSI>50 & rising, break of prior swing high, volume
    # thrust, continuation candle (threshold = how many must agree).
    confluence-threshold: 3        # 3 of 4 momentum votes must agree
    proximity-atr-multiple: 0.5    # MEAN_REVERSION S/R proximity only (unused in MOMENTUM)
    swing-lookback-bars: 20        # breakout lookback (MOMENTUM) / swing window (MEAN_REVERSION)
    volume-sma-period: 20          # volume baseline (volume-thrust pillar)
    enable-candles: true           # continuation-candle pillar
    enable-support-resistance: true # MEAN_REVERSION pillar 3 (unused in MOMENTUM)
    enable-structure: false        # MEAN_REVERSION pillar 4 (unused in MOMENTUM; momentum has its own breakout pillar)
    enable-volume-trend: true      # volume-thrust pillar
    enable-long: true              # take LONG entries
    enable-short: false            # shorts on US500 are crash-only lottery tickets (iteration 7)

logging:
  file:
    name: logs/axe-trader.log
  level:
    io.g3tech: trace
